<title>First Webpage</title>

<head>
	<!-- exisitng content in the <head> element -->
	<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<link rel="stylesheet" href="styles.css">

<body>
	<div class="container">
		<!-- "Introduction" section -->
		<div class="intro">
			<img src="https://via.placeholder.com/150" />
			<h1>John Doe</h1>
			<h3>Web Developer At CareerFoundry</h3>
			<p class="quote">
			{{ Pause and ponder }}
			</p>

		</div>

		<!-- "About" section -->
		<div class="about-grid">
			<div class="i-am">
				<h3>I am</h3>
				<ul class="about-list">
					<li>An engineer</li>
					<li>A reader</li>
					<li>A hobby cook</li>
				</ul>
			</div>

			<div class="i-like">
				<h3>I like to</h3>
				<ul class="about-list">
					<li>Meet new pwople</li>
					<li>Play guitar</li>
					<li>Eat Icecream</li>
				</ul>
			</div>
		</div>
		<!-- Project Images section -->
		<div>
			<h3 class="projects-heading">My Projects</h3>
			<div class="projects-grid">
				<img class="project-image" src="https://via.placeholder.com/300"/>
				<img class="project-image" src="https://via.placeholder.com/300"/>
				<img class="project-image" src="https://via.placeholder.com/300"/>
				<img class="project-image" src="https://via.placeholder.com/300"/>
			</div>
		</div>
		<!-- Links section -->
		<div class="links-and-contact">
			<div class="links">
				<h3>Links</h3>
				<ul class="links-list">
					<li>
						<a href="https://github.com/<user>">Github</a>
					</li>
					<li>
						<a href="https://twitter.com/<user>">Twitter</a>
					</li>
					<li>
						<a href="https://linkedin.com/in/<user>">Linkedin</a>
					</li>
				</ul>
			</div>
			<!-- Contact section -->
			<div class="contact">
				<form action="#">
					<label for="email">
					Email: <input type="email" id="email" placeholder="Enter your email" />
					</label>
					<label for="message">
					Message: <textarea id="message"> Your Message</textare>
					</label>
					<input type="submit" valid="Send Message" />
				</form>
			</div>

		</div>
	
	</div>

</body>
